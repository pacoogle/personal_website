# Deploy su Firebase Hosting a ogni push su master (build statica Next → cartella out/)

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - master

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Next.js → out/)
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PASQUALERAGOZZINO_27022 }}
          channelId: live
          projectId: pasqualeragozzino-27022
